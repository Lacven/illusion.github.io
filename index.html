<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Illusion | Premium Emulator</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-glow: rgba(99, 102, 241, 0.6);
            --secondary: #ec4899;
            --bg-base: #050505;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --text-main: #ffffff;
            --text-muted: #a1a1aa;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
        }

        body {
            background-color: var(--bg-base);
            color: var(--text-main);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Сложный анимированный фон */
        body::before, body::after {
            content: '';
            position: fixed;
            width: 500px;
            height: 500px;
            border-radius: 50%;
            filter: blur(150px);
            z-index: -1;
            animation: floatGlow 15s infinite alternate ease-in-out;
        }

        body::before {
            background: var(--primary-glow);
            top: -100px;
            left: -100px;
        }

        body::after {
            background: rgba(236, 72, 153, 0.3);
            bottom: -100px;
            right: -100px;
            animation-delay: -5s;
        }

        @keyframes floatGlow {
            0% { transform: translate(0, 0) scale(1); }
            100% { transform: translate(50px, 50px) scale(1.2); }
        }

        /* Навигация */
        header {
            width: 100%;
            padding: 20px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            position: fixed;
            top: 0;
            z-index: 100;
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 4px;
            background: linear-gradient(to right, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
        }

        /* Кнопки */
        .btn {
            padding: 12px 28px;
            border-radius: 8px;
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: none;
            position: relative;
            overflow: hidden;
        }

        .btn-glow {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: #fff;
            box-shadow: 0 0 20px var(--primary-glow);
        }

        .btn-glow:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 35px var(--primary-glow), 0 0 15px rgba(236, 72, 153, 0.6);
        }

        /* Главный экран */
        .hero {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 120px 20px 40px;
            margin-top: 80px;
        }

        .hero h1 {
            font-size: clamp(3rem, 8vw, 6rem);
            font-weight: 900;
            line-height: 1.1;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .hero p {
            font-size: clamp(1rem, 2vw, 1.2rem);
            color: var(--text-muted);
            max-width: 600px;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        /* Модальное окно авторизации (Glassmorphism) */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        .modal-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 20px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            transform: scale(0.9);
            transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
        }

        .modal-overlay.active .modal-card {
            transform: scale(1);
        }

        .close-modal {
            position: absolute;
            top: 15px;
            right: 20px;
            color: var(--text-muted);
            font-size: 24px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-modal:hover { color: #fff; }

        .modal-title {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 30px;
            background: linear-gradient(to right, #fff, var(--primary));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .social-btn {
            width: 100%;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            border: 1px solid transparent;
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s ease;
        }

        .social-btn:hover {
            transform: translateY(-2px);
        }

        .btn-twitch { 
            background: #9146FF; 
            box-shadow: 0 5px 15px rgba(145, 70, 255, 0.3);
        }
        .btn-twitch:hover { box-shadow: 0 8px 25px rgba(145, 70, 255, 0.6); }

        .btn-youtube { 
            background: #FF0000; 
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.3);
        }
        .btn-youtube:hover { box-shadow: 0 8px 25px rgba(255, 0, 0, 0.6); }

        .btn-tiktok { 
            background: #000000; 
            border: 1px solid #333;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
        }
        .btn-tiktok:hover { 
            border-color: #00f2fe;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.4), 0 0 20px rgba(254, 0, 79, 0.4); 
        }

        /* Уведомление об успехе */
        .toast {
            position: fixed;
            bottom: -100px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            color: #10b981;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: 600;
            backdrop-filter: blur(10px);
            z-index: 2000;
            transition: bottom 0.5s cubic-bezier(0.68, -0.55, 0.26, 1.55);
        }

        .toast.show {
            bottom: 30px;
        }

    </style>
</head>
<body>

    <header>
        <div class="logo">Illusion</div>
        <button class="btn btn-glow" onclick="openModal()">Вход Creator</button>
    </header>

    <main class="hero">
        <h1>Эмулятор Нового<br>Поколения</h1>
        <p>Премиальная производительность, эксклюзивные инструменты и абсолютный контроль. Платформа создана для победителей и криэйторов.</p>
        <button class="btn btn-glow" style="padding: 18px 40px; font-size: 16px;">Приобрести доступ</button>
    </main>

    <!-- Модальное окно -->
    <div class="modal-overlay" id="authModal">
        <div class="modal-card">
            <span class="close-modal" onclick="closeModal()">&times;</span>
            <div class="modal-title">Интеграция Creator</div>
            
            <button class="social-btn btn-twitch" onclick="startAuth('Twitch')">
                Авторизация Twitch
            </button>
            <button class="social-btn btn-youtube" onclick="startAuth('YouTube')">
                Авторизация YouTube
            </button>
            <button class="social-btn btn-tiktok" onclick="authTikTok()">
                Авторизация TikTok
            </button>
        </div>
    </div>

    <!-- Уведомление -->
    <div class="toast" id="toastMsg">Успешно отправлено в админ-меню!</div>

    <script>
        const modal = document.getElementById('authModal');
        const toast = document.getElementById('toastMsg');
        
        // Данные клиента
        const TIKTOK_CLIENT_KEY = 'aw8r1a947z66pskj';

        function openModal() {
            modal.style.display = 'flex';
            // Небольшая задержка для применения CSS transition
            setTimeout(() => modal.classList.add('active'), 10);
        }

        function closeModal() {
            modal.classList.remove('active');
            setTimeout(() => modal.style.display = 'none', 300);
        }

        // Закрытие по клику вне карточки
        modal.addEventListener('click', (e) => {
            if(e.target === modal) closeModal();
        });

        // Функция логина TikTok с ключом
        function authTikTok() {
            const redirectUri = encodeURIComponent(window.location.origin + '/admin');
            const authUrl = `https://www.tiktok.com/v2/auth/authorize/?client_key=${TIKTOK_CLIENT_KEY}&response_type=code&scope=user.info.basic&redirect_uri=${redirectUri}`;
            
            console.log("Редирект на TikTok:", authUrl);
            processAuth('TikTok');
        }

        // Стандартный вызов для остальных платформ
        function startAuth(platform) {
            processAuth(platform);
        }

        // Логика имитации авторизации и отправки в админку
        function processAuth(platform) {
            // Закрываем окно авторизации
            closeModal();

            // Создаем объект данных сессии
            const sessionData = {
                id: Math.random().toString(36).substr(2, 9),
                platform: platform,
                time: new Date().toLocaleString(),
                status: 'Новый Creator'
            };

            // ОТПРАВКА В АДМИН-МЕНЮ (Сохранение в localStorage)
            // В реальном проекте тут будет fetch('https://твой-сайт.ru/api/admin', {...})
            let adminLogs = JSON.parse(localStorage.getItem('illusion_admin_logs')) || [];
            adminLogs.push(sessionData);
            localStorage.setItem('illusion_admin_logs', JSON.stringify(adminLogs));

            // Показываем красивое уведомление
            showToast(`Вход через ${platform} выполнен. Данные отправлены в админ-меню!`);

            // Имитация редиректа в панель
            setTimeout(() => {
                // Если у тебя готов файл админки, раскомментируй строку ниже и впиши путь
                // window.location.href = 'admin.html';
                console.log("Данные в БД админки:", JSON.parse(localStorage.getItem('illusion_admin_logs')));
            }, 2000);
        }

        function showToast(message) {
            toast.innerText = message;
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 4000);
        }
    </script>
</body>
</html>
